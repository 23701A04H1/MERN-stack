<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet"href="registation.css">
</head>
<body>
    <h2>student regestation form</h2>
    <form>
    name:
    <br>
    <input type="text"placeholder="enter your name">
    <br><br>
    email:
    <br>
    <input type="email"placeholder="enter your email">
    <br><br>
    password:
    <br>
    <input type="password"placeholder="enter your password">
    <br><br> 
    gender:
     <br>
      <input type="radio"name="gender">male
      <br>
      <input type="radio"name="gender">female
      <br>
      <input type="radio"name="gender">other
      <br><br> 

    skills:
    <br>
     <input type="checkbox"name="skills">html
     <br>
     <input type="checkbox"name="skills">c++
     <br>
     <input type="checkbox"name="skills">java
     <br><br>

    message:
    <br>
     <textarea rows="4" cols="30"placeholder="write your massage"></textarea>
    <br><br>
    
    submit button:
    <br>
     <br>
     <input type="submit">


    
     </form>
</body>
</html>
